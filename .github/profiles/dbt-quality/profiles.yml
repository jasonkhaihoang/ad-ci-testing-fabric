# Profiles for dbt-project-quality.yml only.
# Uses DuckDB — no Fabric connection. Isolated from fabricspark profiles
# so dbt-duckdb does not need to be installed in the main CI provision job.
dbt_project_quality_profile:
  outputs:
    dbt_quality:
      type: duckdb
      path: /tmp/dbt_quality.duckdb
      schema: main
      threads: 4
  target: dbt_quality
