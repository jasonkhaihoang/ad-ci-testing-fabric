# Orphaned Ephemeral Workspace Cleanup
#
# Triggered daily or manually. Deletes vibedata_ephemeral_* Fabric workspaces
# whose PR has been closed or no longer exists in THIS domain repo.

name: Orphaned Workspace Cleanup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install requests --quiet

      - name: Login — Fabric UAMI
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_FABRIC_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Delete orphaned ephemeral workspaces
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/fabric_api.py cleanup --repo "$GITHUB_REPOSITORY"
