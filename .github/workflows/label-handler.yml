# Handles diff-acknowledged label events and synchronize to manage the
# ci/data-diff status + bound-hash state machine (VD-1746).
name: Label Handler

on:
  pull_request:
    types: [labeled, unlabeled, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  issues: write

concurrency:
  group: label-handler-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  SCRIPTS: .github/scripts

jobs:
  label-handler:
    name: "diff-acknowledged label handler"
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'synchronize' ||
      github.event.label.name == 'diff-acknowledged'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Handle label event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'EOF'
          import os, subprocess, sys, tempfile
          sys.path.insert(0, ".github/scripts")
          import pr_comment, emit_status, label_binding, notify_render

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["PR_HEAD_SHA"]
          pr_number = os.environ["PR_NUMBER"]
          event_action = os.environ["EVENT_ACTION"]
          label_name = os.environ.get("LABEL_NAME", "")
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"

          marker_comment_id = pr_comment.find_by_marker(label_binding.MARKER, pr_number, repo)
          existing_body = None
          if marker_comment_id:
              res = subprocess.run(
                  ["gh", "api", f"repos/{repo}/issues/comments/{marker_comment_id}", "--jq", ".body"],
                  capture_output=True, text=True,
              )
              existing_body = res.stdout.strip()
          marker = label_binding.read_marker(existing_body)

          decision = label_binding.label_handler_decision(event_action, label_name, marker)
          if decision is None:
              sys.exit(0)

          action = decision["action"]

          if action == "strip_label":
              subprocess.run(
                  ["gh", "api", "--method", "DELETE",
                   f"repos/{repo}/issues/{pr_number}/labels/{label_binding.LABEL_NAME}"],
                  capture_output=True,
              )

          elif action == "bind":
              new_body = label_binding.write_marker(decision["hash"], bound_hash=decision["hash"])
              pr_comment.upsert(label_binding.MARKER, new_body, pr_number, repo)
              gate5_id = pr_comment.find_by_marker(notify_render.GATE_5_MARKER, pr_number, repo)
              if gate5_id:
                  res = subprocess.run(
                      ["gh", "api", f"repos/{repo}/issues/comments/{gate5_id}", "--jq", ".body"],
                      capture_output=True, text=True,
                  )
                  gate5_body = res.stdout.strip()
                  if gate5_body:
                      new_gate5 = notify_render.toggle_gate_5_ack(gate5_body, ack_active=True)
                      pr_comment.upsert(notify_render.GATE_5_MARKER, new_gate5, pr_number, repo)
              else:
                  print(f"warning: Gate 5 marker comment not found for PR {pr_number} — ack banner not toggled", file=sys.stderr, flush=True)
              emit_status.emit_status(repo, sha, "ci/data-diff", "success",
                                     "Gate 5: diff acknowledged", run_url)

          elif action == "reject":
              subprocess.run(
                  ["gh", "api", "--method", "DELETE",
                   f"repos/{repo}/issues/{pr_number}/labels/{label_binding.LABEL_NAME}"],
                  capture_output=True,
              )
              with tempfile.NamedTemporaryFile(mode="w", suffix=".md", delete=False) as tmp:
                  tmp.write(label_binding.REJECTION_TEXT)
                  tmp_path = tmp.name
              try:
                  subprocess.run(
                      ["gh", "pr", "comment", pr_number, "--repo", repo, "--body-file", tmp_path],
                      capture_output=True,
                  )
              finally:
                  os.unlink(tmp_path)

          elif action == "revert":
              if existing_body:
                  new_body = label_binding.delete_bound(existing_body)
                  pr_comment.upsert(label_binding.MARKER, new_body, pr_number, repo)
              gate5_id = pr_comment.find_by_marker(notify_render.GATE_5_MARKER, pr_number, repo)
              if gate5_id:
                  res = subprocess.run(
                      ["gh", "api", f"repos/{repo}/issues/comments/{gate5_id}", "--jq", ".body"],
                      capture_output=True, text=True,
                  )
                  gate5_body = res.stdout.strip()
                  if gate5_body:
                      new_gate5 = notify_render.toggle_gate_5_ack(gate5_body, ack_active=False)
                      pr_comment.upsert(notify_render.GATE_5_MARKER, new_gate5, pr_number, repo)
              # Posting failure is always correct here: `diff-acknowledged` only reaches the
              # bound state when Gate 5 previously reported a non-empty diff for this head SHA
              # (label_binding.label_handler_decision rejects application when no non-empty diff
              # is present). Removing the label therefore restores exactly the failure state
              # Gate 5 originally emitted — there is no "empty diff" case to guard against.
              emit_status.emit_status(repo, sha, "ci/data-diff", "failure",
                                     "Gate 5: diff-acknowledged label removed", run_url)
          EOF
