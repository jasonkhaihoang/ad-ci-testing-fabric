name: Publish Prod Manifest

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'snapshots/**'
      - 'sources/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - '.github/profiles/profiles.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install "dbt-core>=1.8" "dbt-duckdb>=1.8" "vd-dbt-fabricspark>=1.9" pyyaml --quiet

      - name: Patch fabricspark adapter — allow lakehouse_schemas_enabled from profile
        run: |
          python3 - <<'PYEOF'
          import re
          import dbt.adapters.fabricspark.credentials as c_mod

          with open(c_mod.__file__) as f:
              src = f.read()

          # 1. Remove init=False so the profile value is accepted
          src = src.replace(
              "lakehouse_schemas_enabled: bool = field(default=False, init=False)",
              "lakehouse_schemas_enabled: bool = field(default=False)",
          )

          # 2. Remove the stripping block in __pre_deserialize__
          src = re.sub(
              r"\s*# lakehouse_schemas_enabled is init=False.*?del data\[.lakehouse_schemas_enabled.\]\n",
              "\n",
              src,
              flags=re.DOTALL,
          )

          # 3. Propagate to FabricSparkRelation._schemas_enabled at credential
          #    load time so dbt parse (no live connection) picks it up.
          inject = (
              "        if self.lakehouse_schemas_enabled:\n"
              "            from dbt.adapters.fabricspark.relation import FabricSparkRelation\n"
              "            FabricSparkRelation._schemas_enabled = True\n"
          )
          src = src.replace("        # Validate spark_config", inject + "        # Validate spark_config")

          with open(c_mod.__file__, "w") as f:
              f.write(src)

          print(f"Patched {c_mod.__file__}", flush=True)
          PYEOF

      - name: Generate prod-manifest profile
        run: |
          python3 - <<'PYEOF'
          import yaml, os, sys

          with open("ci-config.yml") as f:
              config = yaml.safe_load(f) or {}

          workspace_id   = config.get("prod_workspace_id", "")
          workspace_name = config.get("prod_workspace_name", "")
          lakehouse_id   = config.get("prod_lakehouse_id", "")
          lakehouse      = config.get("prod_lakehouse_name", "")
          schema         = config.get("prod_schema", "main")

          if not all([workspace_id, workspace_name, lakehouse_id, lakehouse]):
              print("ci-config.yml missing prod_workspace_id / prod_workspace_name / prod_lakehouse_id / prod_lakehouse_name — cannot generate prod-manifest profile.", flush=True)
              sys.exit(1)

          with open(".github/profiles/profiles.yml") as f:
              profiles = yaml.safe_load(f)

          profile_name = next(iter(profiles))
          profiles[profile_name]["outputs"]["prod_manifest"] = {
              "type": "fabricspark",
              "method": "az_cli",
              "workspaceid": workspace_id,
              "workspace_name": workspace_name,
              "lakehouse": lakehouse,
              "lakehouseid": lakehouse_id,
              "lakehouse_schemas_enabled": True,
              "schema": schema,
              "spark_config": {"name": "dbt_prod_manifest"},
          }

          os.makedirs("/tmp/prod-profiles", exist_ok=True)
          with open("/tmp/prod-profiles/profiles.yml", "w") as f:
              yaml.dump(profiles, f)

          print(f"prod_manifest target: {profile_name} → {workspace_name}.{lakehouse}.{schema}", flush=True)
          PYEOF

      - name: Parse dbt project
        run: |
          dbt deps --quiet
          dbt parse --profiles-dir /tmp/prod-profiles --target prod_manifest --quiet

      - name: Patch manifest relation_name to 4-part Fabric naming
        run: |
          python3 - <<'PYEOF'
          import json, yaml

          with open("ci-config.yml") as f:
              config = yaml.safe_load(f) or {}

          workspace = config.get("prod_workspace_name", "")
          lakehouse = config.get("prod_lakehouse_name", "")

          with open("target/manifest.json") as f:
              manifest = json.load(f)

          patched = 0
          for uid, node in manifest.get("nodes", {}).items():
              if node.get("resource_type") not in ("model", "snapshot", "seed"):
                  continue
              schema = node.get("schema", "")
              alias  = node.get("alias") or node.get("name", "")
              if not (schema and alias):
                  continue
              node["relation_name"] = f"`{workspace}`.`{lakehouse}`.`{schema}`.`{alias}`"
              patched += 1

          with open("target/manifest.json", "w") as f:
              json.dump(manifest, f)

          print(f"Patched {patched} nodes → {workspace}.{lakehouse}.<schema>.<table>", flush=True)
          PYEOF

      - name: Upload prod-manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-manifest
          path: target/manifest.json
          retention-days: 90
