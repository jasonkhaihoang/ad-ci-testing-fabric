name: Publish Prod Manifest

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'snapshots/**'
      - 'sources/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - '.github/profiles/profiles.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install "dbt-core>=1.8" "dbt-fabricspark>=1.8" pyyaml --quiet

      - name: Generate prod-manifest profile
        run: |
          python3 - <<'PYEOF'
          import yaml, os, sys

          with open("ci-config.yml") as f:
              config = yaml.safe_load(f) or {}

          workspace_id   = config.get("prod_workspace_id", "")
          workspace_name = config.get("prod_workspace_name", "")
          lakehouse_id   = config.get("prod_lakehouse_id", "")
          lakehouse      = config.get("prod_lakehouse_name", "")
          schema         = config.get("prod_schema", "main")

          if not all([workspace_id, workspace_name, lakehouse_id, lakehouse]):
              print("ci-config.yml missing prod_workspace_id / prod_workspace_name / prod_lakehouse_id / prod_lakehouse_name — cannot generate prod-manifest profile.", flush=True)
              sys.exit(1)

          with open(".github/profiles/profiles.yml") as f:
              profiles = yaml.safe_load(f)

          profile_name = next(iter(profiles))
          profiles[profile_name]["outputs"]["prod_manifest"] = {
              "type": "fabricspark",
              "method": "az_cli",
              "workspaceid": workspace_id,
              "workspace_name": workspace_name,
              "lakehouse": lakehouse,
              "lakehouseid": lakehouse_id,
              "lakehouse_schemas_enabled": True,
              "schema": schema,
              "spark_config": {"name": "dbt_prod_manifest"},
          }

          os.makedirs("/tmp/prod-profiles", exist_ok=True)
          with open("/tmp/prod-profiles/profiles.yml", "w") as f:
              yaml.dump(profiles, f)

          print(f"prod_manifest target: {profile_name} → {workspace_name}.{lakehouse}.{schema}", flush=True)
          PYEOF

      - name: Parse dbt project — compile target
        run: |
          dbt deps --quiet
          dbt parse --profiles-dir .github/profiles --target dbt_fabric_compile --quiet
          mkdir -p /tmp/prod-manifests
          cp target/manifest.json /tmp/prod-manifests/manifest.json

      - name: Parse dbt project — prod target
        run: |
          dbt parse --profiles-dir /tmp/prod-profiles --target prod_manifest --quiet
          cp target/manifest.json /tmp/prod-manifests/manifest_prod.json

      - name: Stamp workspace_name onto manifest_prod.json nodes
        run: |
          python3 - <<'PYEOF'
          import json, yaml

          with open("ci-config.yml") as f:
              config = yaml.safe_load(f) or {}
          workspace_name = config.get("prod_workspace_name", "")
          if not workspace_name:
              print("prod_workspace_name missing from ci-config.yml — skipping workspace stamp", flush=True)
              exit(0)

          with open("/tmp/prod-manifests/manifest_prod.json") as f:
              manifest = json.load(f)

          stamped = 0
          for node in manifest.get("nodes", {}).values():
              node.setdefault("config", {})["workspace_name"] = workspace_name
              stamped += 1

          with open("/tmp/prod-manifests/manifest_prod.json", "w") as f:
              json.dump(manifest, f, separators=(",", ":"))

          print(f"Stamped workspace_name={workspace_name!r} onto {stamped} manifest nodes", flush=True)
          PYEOF

      - name: Upload prod-manifest artifact
        uses: actions/upload-artifact@v7
        with:
          name: prod-manifest
          path: |
            /tmp/prod-manifests/manifest.json
            /tmp/prod-manifests/manifest_prod.json
          retention-days: 90
