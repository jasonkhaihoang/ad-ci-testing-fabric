name: Publish Prod Manifest

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'snapshots/**'
      - 'sources/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - '.github/profiles/profiles.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install "dbt-core>=1.8" "dbt-duckdb>=1.8" --quiet

      - name: Parse dbt project
        run: |
          dbt deps --quiet
          dbt parse --profiles-dir .github/profiles --target dbt_quality --quiet

      - name: Upload prod-manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-manifest
          path: target/manifest.json
          retention-days: 90
