# Ephemeral Fabric CI Workflow
#
# Self-contained — all scripts live in .github/scripts/ within this repo.
# Domain configuration: ci-config.yml in the repo root.
#
# Authentication: GitHub OIDC — two UAMIs, no credentials stored.
# Required GitHub Variables (set at org or repo level):
#   AZURE_TENANT_ID, AZURE_KV_CLIENT_ID, AZURE_FABRIC_CLIENT_ID, AZURE_KEYVAULT_URL
#   GH_APP_ID_KV_NAME, GH_INSTALLATION_ID_KV_NAME, GH_APP_PEM_KV_NAME
#   FABRIC_CAPACITY_ID_KV_NAME  (optional — defaults to "vibedata-fabric-capacity-id")
#   AAD_DOMAIN  (optional — UPN domain for PR author lookup, defaults to eng.acceleratedata.ai)

name: Ephemeral Fabric CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write   # required for GitHub OIDC → Azure login
  statuses: write   # required for intent-based commit status posting
  actions: read     # required for gh run list / gh run download (artifact mode)

env:
  PYTHON_VERSION: "3.11"
  SCRIPTS: .github/scripts

jobs:
  # ─── PREFLIGHT ────────────────────────────────────────────────────────────
  # Auto-rebases branch onto main if behind, then parses ci-config.yml.
  # Uses KV UAMI to fetch App credentials for the force-push token; no Fabric UAMI needed.
  preflight:
    name: "ci/preflight: intent + config"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      domain: ${{ steps.preflight.outputs.domain }}
      prod_workspace_id: ${{ steps.preflight.outputs.prod_workspace_id }}
      prod_workspace_name: ${{ steps.preflight.outputs.prod_workspace_name }}
      prod_lakehouse_id: ${{ steps.preflight.outputs.prod_lakehouse_id }}
      prod_lakehouse_name: ${{ steps.preflight.outputs.prod_lakehouse_name }}
      prod_schema: ${{ steps.preflight.outputs.prod_schema }}
      ci_target: ${{ steps.preflight.outputs.ci_target }}
      intent_slug: ${{ steps.preflight.outputs.intent_slug }}
      ephemeral_name: ${{ steps.names.outputs.ephemeral_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pyyaml --quiet

      - name: Emit ci/preflight pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 ${{ env.SCRIPTS }}/emit_status.py \
            --context "ci/preflight" \
            --state pending \
            --description "Preflight: validating intent + config" \
            --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Check branch sync
        id: sync
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=$(gh api \
            "repos/${{ github.repository }}/compare/main...${{ github.event.pull_request.head.sha }}" \
            --jq '.behind_by' 2>/dev/null || echo "0")
          echo "behind_by=${BEHIND}" >> "$GITHUB_OUTPUT"

      - name: Run preflight checks
        id: preflight
        run: |
          mkdir -p reports
          python3 ${{ env.SCRIPTS }}/preflight.py \
            --branch-name "${{ github.head_ref }}" \
            --behind-by "${{ steps.sync.outputs.behind_by || '0' }}" \
            --ci-config-path "ci-config.yml" \
            --output reports/preflight.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Compute ephemeral workspace name
        id: names
        run: |
          REPO=$(echo "${{ github.event.repository.name }}" | tr '-' '_')
          NAME="vibedata_ephemeral_${REPO}_${{ github.event.pull_request.number }}"
          echo "ephemeral_name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "Ephemeral workspace name: ${NAME}"

      - name: Post preflight comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, sys
          sys.path.insert(0, ".github/scripts")
          import notify_render, pr_comment
          try:
              with open("reports/preflight.json") as f:
                  result = json.load(f)
          except (OSError, json.JSONDecodeError):
              result = None
          body = notify_render.render_preflight_comment(result)
          pr_comment.upsert("<!-- ci-preflight -->", body, os.environ["PR_NUMBER"], os.environ["GITHUB_REPOSITORY"])
          EOF

      - name: Emit ci/preflight success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 ${{ env.SCRIPTS }}/emit_status.py \
            --context "ci/preflight" \
            --state success \
            --description "Preflight passed" \
            --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Emit ci/preflight failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 ${{ env.SCRIPTS }}/emit_status.py \
            --context "ci/preflight" \
            --state failure \
            --description "Preflight failed — see PR comment" \
            --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─── FETCH PROD STATE ────────────────────────────────────────────────────────
  # Downloads prod-state/manifest.json for Slim CI deferral.
  # Modes: artifact (gh run download from CD), onelake (Fabric UAMI), greenfield (dbt parse fallback).
  fetch-prod-state:
    name: "ci/state-modified+: fetch prod state"
    if: github.event.action != 'closed'
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      greenfield_fallback: ${{ steps.fetch.outputs.greenfield_fallback }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pyyaml "dbt-core>=1.8" "dbt-fabricspark>=1.8" --quiet

      - name: Emit Gate 1 pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 ${{ env.SCRIPTS }}/emit_status.py \
            --context "ci/state-modified+" \
            --state pending \
            --description "Gate 1: fetching prod state" \
            --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Parse prod manifest mode
        id: parse-mode
        run: |
          python3 - <<'EOF'
          import yaml, os, sys
          try:
            with open("ci-config.yml") as f:
              c = yaml.safe_load(f) or {}
            mode = (c.get("prod_manifest_source") or {}).get("mode", "artifact")
          except Exception:
            mode = "artifact"
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
            out.write(f"mode={mode}\n")
          print(f"prod_manifest_source.mode={mode}")
          EOF

      - name: Login — Fabric UAMI (onelake mode only)
        if: steps.parse-mode.outputs.mode == 'onelake'
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_FABRIC_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Fetch prod state
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: python3 ${{ env.SCRIPTS }}/fetch_prod_state.py

      - name: Upload prod-state artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-state-pr${{ github.event.pull_request.number }}
          path: prod-state/
          retention-days: 7

      - name: Compute model closure
        if: always()
        continue-on-error: true
        run: |
          dbt deps --profiles-dir .github/profiles --target dbt_fabric_compile --quiet 2>&1 || true
          dbt ls \
            --select state:modified+ \
            --resource-type model snapshot \
            --state prod-state \
            --output json \
            --profiles-dir .github/profiles \
            --target dbt_fabric_compile \
            2>/dev/null > /tmp/dbt_ls_output.json || true
          python3 - <<'PYEOF'
          import json, sys, os
          sys.path.insert(0, os.environ.get("GITHUB_WORKSPACE", ".") + "/.github/scripts")
          from dbt_manifest import Manifest

          unique_ids = []
          try:
              with open("/tmp/dbt_ls_output.json") as f:
                  for line in f:
                      stripped = line.strip()
                      if not stripped:
                          continue
                      try:
                          entry = json.loads(stripped)
                          uid = entry.get("unique_id")
                          if uid:
                              unique_ids.append(uid)
                      except ValueError:
                          pass
          except FileNotFoundError:
              pass

          manifest = Manifest.from_path("target/manifest.json")
          own_model_uids = set(manifest.own_models().keys())
          closure = []
          for uid in unique_ids:
              node = manifest.node(uid)
              if not node:
                  continue
              if uid in own_model_uids or node.get("resource_type") == "snapshot":
                  closure.append({
                      "name": node.get("name", uid),
                      "materialization": (node.get("config") or {}).get("materialized", "unknown"),
                  })

          os.makedirs("prod-state", exist_ok=True)
          with open("prod-state/closure.json", "w") as f:
              json.dump(closure, f, indent=2)
          print(f"Closure written: {len(closure)} model(s)", flush=True)
          PYEOF

      - name: Emit Gate 1 final status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE=success
            DESC="Gate 1: prod state resolved"
          else
            STATE=failure
            DESC="Gate 1: failed — see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          python3 ${{ env.SCRIPTS }}/emit_status.py \
            --context "ci/state-modified+" \
            --state "$STATE" \
            --description "$DESC" \
            --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Post gate-1 comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GREENFIELD_FALLBACK: ${{ steps.fetch.outputs.greenfield_fallback }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SCRIPTS_DIR: ${{ env.SCRIPTS }}
          GATE1_JOB_STATUS: ${{ job.status }}
        run: |
          python3 - <<'EOF'
          import json, os, sys
          sys.path.insert(0, os.environ["GITHUB_WORKSPACE"] + "/" + os.environ["SCRIPTS_DIR"])
          import notify_render, pr_comment
          greenfield = os.environ.get("GREENFIELD_FALLBACK", "false").lower() == "true"
          passed = os.environ.get("GATE1_JOB_STATUS", "failure").lower() == "success"
          try:
              with open("prod-state/closure.json") as f:
                  closure = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              closure = []
          body = notify_render.render_gate_1_comment(closure, greenfield=greenfield, passed=passed)
          pr_comment.upsert(notify_render.GATE_1_MARKER, body, os.environ["PR_NUMBER"], os.environ["REPO"])
          EOF

  # ─── PROVISION ────────────────────────────────────────────────────────────
  # 1. KV UAMI: fetch Fabric capacity ID + GitHub App config → GITHUB_ENV
  # 2. Fabric UAMI: find-or-create workspace + lakehouse, inject notebook
  provision:
    name: "provision: ephemeral workspace & shortcuts"
    if: github.event.action != 'closed'
    needs: [preflight, fetch-prod-state]
    runs-on: ubuntu-latest
    outputs:
      ephemeral_workspace_id: ${{ steps.provision.outputs.workspace_id }}
      ephemeral_lakehouse_id: ${{ steps.provision.outputs.lakehouse_id }}
      notebook_id: ${{ steps.generate-notebook.outputs.notebook_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pyyaml --quiet

      - name: Login — KV UAMI
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_KV_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Fetch Fabric capacity ID from Key Vault
        env:
          AZURE_KEYVAULT_URL: ${{ vars.AZURE_KEYVAULT_URL }}
          FABRIC_CAPACITY_ID_KV_NAME: ${{ vars.FABRIC_CAPACITY_ID_KV_NAME }}
        run: python3 ${{ env.SCRIPTS }}/kv_utils.py fetch-fabric

      - name: Login — Fabric UAMI
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_FABRIC_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Cancel in-flight jobs
        env:
          EPHEMERAL_NAME: ${{ needs.preflight.outputs.ephemeral_name }}
        run: python3 ${{ env.SCRIPTS }}/fabric_api.py cancel-running-jobs --name "$EPHEMERAL_NAME"

      - name: Provision ephemeral workspace and lakehouse
        id: provision
        env:
          EPHEMERAL_NAME: ${{ needs.preflight.outputs.ephemeral_name }}
        run: python3 ${{ env.SCRIPTS }}/fabric_api.py provision --name "$EPHEMERAL_NAME"

      - name: Create Fabric Environment from bundle
        id: create-environment
        run: |
          python3 ${{ env.SCRIPTS }}/fabric_api.py create-environment \
            --workspace-id "${{ steps.provision.outputs.workspace_id }}" \
            --config .github/environment/ephemeral-ci-environment.yaml

      - name: Publish Fabric Environment (Full Mode)
        id: publish-environment
        run: |
          python3 ${{ env.SCRIPTS }}/fabric_api.py publish-environment \
            --workspace-id "${{ steps.provision.outputs.workspace_id }}" \
            --environment-id "${{ steps.create-environment.outputs.environment_id }}"

      - name: Set Environment as workspace default
        run: |
          python3 ${{ env.SCRIPTS }}/fabric_api.py set-workspace-default-environment \
            --workspace-id "${{ steps.provision.outputs.workspace_id }}" \
            --environment-name "${{ steps.create-environment.outputs.environment_name }}" \
            --runtime-version "${{ steps.create-environment.outputs.runtime_version }}"

      - name: Add PR author as Contributor on ephemeral workspace
        env:
          AAD_DOMAIN: ${{ vars.AAD_DOMAIN }}
          AAD_UPN_OVERRIDE: ${{ secrets.AAD_UPN_OVERRIDE }}
        run: |
          python3 ${{ env.SCRIPTS }}/fabric_api.py add-contributor \
            --workspace-id "${{ steps.provision.outputs.workspace_id }}" \
            --github-login "${{ github.event.pull_request.user.login }}"

      - name: Download prod-state artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-state-pr${{ github.event.pull_request.number }}
          path: prod-state/
        continue-on-error: true

      - name: Upload prod-state manifest to ephemeral workspace OneLake
        id: upload-prod-state
        run: |
          if [ -f prod-state/manifest.json ]; then
            python3 ${{ env.SCRIPTS }}/fabric_api.py upload-file \
              --workspace-id "${{ steps.provision.outputs.workspace_id }}" \
              --lakehouse-id "${{ steps.provision.outputs.lakehouse_id }}" \
              --local-path prod-state/manifest.json \
              --remote-path Files/ci-artifacts/prod-state/manifest.json
          else
            echo "No prod-state/manifest.json found — skipping OneLake upload."
          fi

      - name: Install dbt and parse current branch
        run: |
          pip install "dbt-core>=1.8" "dbt-fabricspark>=1.8" --quiet
          dbt deps --quiet
          dbt parse --profiles-dir .github/profiles --target dbt_fabric_compile --quiet

      - name: Derive shortcuts from manifest
        env:
          PROD_WORKSPACE_ID: ${{ needs.preflight.outputs.prod_workspace_id }}
          PROD_LAKEHOUSE_ID: ${{ needs.preflight.outputs.prod_lakehouse_id }}
        run: |
          mkdir -p reports
          python3 ${{ env.SCRIPTS }}/derive_shortcuts.py --output shortcuts.json

      - name: Seed shortcuts in ephemeral lakehouse
        run: |
          python3 ${{ env.SCRIPTS }}/fabric_api.py seed-shortcuts \
            --from-file shortcuts.json \
            --workspace-id "${{ steps.provision.outputs.workspace_id }}" \
            --lakehouse-id "${{ steps.provision.outputs.lakehouse_id }}"

      - name: Emit deployment manifest
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 ${{ env.SCRIPTS }}/emit_deployment_manifest.py

      - name: Upload deployment manifest to ephemeral OneLake
        run: |
          python3 ${{ env.SCRIPTS }}/fabric_api.py upload-file \
            --workspace-id "${{ steps.provision.outputs.workspace_id }}" \
            --lakehouse-id "${{ steps.provision.outputs.lakehouse_id }}" \
            --local-path "reports/deployment-manifest-${{ github.event.pull_request.head.sha }}.json" \
            --remote-path "Files/ci-artifacts/deployment-manifest-${{ github.event.pull_request.head.sha }}.json"

      - name: Upload deployment manifest GHA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest-${{ github.event.pull_request.head.sha }}
          path: reports/deployment-manifest-${{ github.event.pull_request.head.sha }}.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload shortcut seeding report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-reports-shortcuts-pr${{ github.event.pull_request.number }}
          path: reports/shortcut_seeding.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Generate and deploy CI notebook
        id: generate-notebook
        env:
          AZURE_KEYVAULT_URL: ${{ vars.AZURE_KEYVAULT_URL }}
          EPHEMERAL_WORKSPACE_ID: ${{ steps.provision.outputs.workspace_id }}
          EPHEMERAL_WORKSPACE_NAME: ${{ needs.preflight.outputs.ephemeral_name }}
          EPHEMERAL_LAKEHOUSE_ID: ${{ steps.provision.outputs.lakehouse_id }}
          HEAD_BRANCH: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_URL: ${{ github.event.repository.clone_url }}
          GH_APP_ID_KV_NAME: ${{ vars.GH_APP_ID_KV_NAME }}
          GH_INSTALLATION_ID_KV_NAME: ${{ vars.GH_INSTALLATION_ID_KV_NAME }}
          GH_APP_PEM_KV_NAME: ${{ vars.GH_APP_PEM_KV_NAME }}
          PROD_STATE_ABFSS: ${{ steps.upload-prod-state.outputs.abfss_path }}
          CI_TARGET: ${{ needs.preflight.outputs.ci_target }}
          PROD_WORKSPACE_NAME: ${{ needs.preflight.outputs.prod_workspace_name }}
          PROD_LAKEHOUSE_NAME: ${{ needs.preflight.outputs.prod_lakehouse_name }}
        run: python3 ${{ env.SCRIPTS }}/generate_ci_notebook.py

      - name: Post workspace comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EPHEMERAL_WORKSPACE_ID: ${{ steps.provision.outputs.workspace_id }}
          EPHEMERAL_WORKSPACE_NAME: ${{ needs.preflight.outputs.ephemeral_name }}
          HEAD_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GREENFIELD_FALLBACK: ${{ needs.fetch-prod-state.outputs.greenfield_fallback }}
        run: python3 ${{ env.SCRIPTS }}/notify.py --workspace-comment-only

  # ─── STATIC ANALYSIS ──────────────────────────────────────────────────────
  # Gate 0: linting + dbt compile + build --empty + diff-scoped schema gate.
  # Posts ci/static-check commit status; either blocking step failing marks Gate 0 failed.
  static-analysis:
    name: "ci/static-check: static analysis"
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install analysis tools
        run: |
          pip install ruff sqlfluff pyyaml "dbt-core>=1.8" "dbt-fabricspark>=1.8" --quiet
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - run: mkdir -p reports

      - name: Emit Gate 0 pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 ${{ env.SCRIPTS }}/emit_status.py \
            --context "ci/static-check" \
            --state pending \
            --description "Gate 0: static analysis running" \
            --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: ruff
        continue-on-error: true
        run: ruff check . --output-format json > reports/ruff.json 2>/dev/null

      - name: sqlfluff
        continue-on-error: true
        run: sqlfluff lint models/ --dialect sparksql --format json > reports/sqlfluff.json 2>/dev/null

      - name: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect --source . \
            --report-format json \
            --report-path reports/gitleaks.json \
            --no-banner 2>/dev/null
          # gitleaks may skip writing the report file when there are zero findings.
          # Create an empty-findings sentinel so Gate 0 evaluate can distinguish
          # "clean scan" from "step never ran".
          [ -f reports/gitleaks.json ] || echo '[]' > reports/gitleaks.json

      - name: dbt scorecard
        continue-on-error: true
        env:
          WORKSPACE_ID: dummy
          WORKSPACE_NAME: dummy
          LAKEHOUSE: dummy
          LAKEHOUSE_ID: dummy
          SCHEMA: dummy
          DBT_JOB_NAME: ci-parse
        run: |
          dbt deps --quiet 2>/dev/null || true
          dbt compile --profiles-dir .github/profiles --target dbt_fabric_compile --exclude package:elementary --quiet 2>/dev/null || true
          python3 ${{ env.SCRIPTS }}/scorecard.py \
            --manifest target/manifest.json \
            --agents-md AGENTS.md \
            > reports/scorecard.json

      - name: dbt compile
        continue-on-error: true
        env:
          WORKSPACE_ID: dummy
          WORKSPACE_NAME: dummy
          LAKEHOUSE: dummy
          LAKEHOUSE_ID: dummy
          SCHEMA: dummy
        run: |
          python3 ${{ env.SCRIPTS }}/dbt_error_report.py reports/dbt_compile.json \
            compile --profiles-dir .github/profiles --target dbt_fabric_compile \
            --exclude package:elementary || true

      - name: Schema gate
        continue-on-error: true
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 ${{ env.SCRIPTS }}/schema_gate.py \
            --manifest target/manifest.json \
            --repo "${{ github.repository }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --output reports/schema_gate.json || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-reports-pr${{ github.event.pull_request.number }}
          path: reports/
          retention-days: 30

      - name: Post gate-0 comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          sys.path.insert(0, ".github/scripts")
          from notify_render import render_gate_0_comment
          import pr_comment

          def load(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except (OSError, json.JSONDecodeError):
                  return None

          compile_result    = load("reports/dbt_compile.json")
          schema_gate       = load("reports/schema_gate.json")
          ruff              = load("reports/ruff.json")
          sqlfluff          = load("reports/sqlfluff.json")
          gitleaks          = load("reports/gitleaks.json")
          scorecard         = load("reports/scorecard.json")
          shortcut_seeding  = load("reports/shortcut_seeding.json")

          body = render_gate_0_comment(
              compile_result, schema_gate,
              ruff=ruff, sqlfluff=sqlfluff, gitleaks=gitleaks,
              scorecard=scorecard, shortcut_seeding=shortcut_seeding,
          )
          pr_comment.upsert(
              marker="<!-- ci-static-check -->",
              body=body,
              pr_number=os.environ["PR_NUMBER"],
              repo=os.environ["GITHUB_REPOSITORY"],
          )
          PYEOF

      - name: Gate 0 evaluate
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import sys

          def load(path):
              if not os.path.exists(path):
                  return None
              try:
                  with open(path) as f:
                      return json.load(f)
              except (json.JSONDecodeError, OSError):
                  return None

          def ruff_ok(r):
              return isinstance(r, list) and len(r) == 0

          def sqlfluff_ok(r):
              if isinstance(r, list):
                  files = r
              elif isinstance(r, dict):
                  files = r.get("files", [])
              else:
                  return False
              return all(not f.get("violations") for f in files)

          def gitleaks_ok(r):
              if isinstance(r, list):
                  findings = r
              elif isinstance(r, dict):
                  findings = r.get("findings", [])
              else:
                  return False
              return len(findings) == 0

          def passed_field_ok(r):
              return isinstance(r, dict) and bool(r.get("passed"))

          checks = [
              ("ruff", ruff_ok, "reports/ruff.json"),
              ("sqlfluff", sqlfluff_ok, "reports/sqlfluff.json"),
              ("gitleaks", gitleaks_ok, "reports/gitleaks.json"),
              ("dbt compile", passed_field_ok, "reports/dbt_compile.json"),
              ("schema gate", passed_field_ok, "reports/schema_gate.json"),
              ("dbt scorecard", passed_field_ok, "reports/scorecard.json"),
          ]

          failures = []
          for name, check, path in checks:
              report = load(path)
              if report is None:
                  failures.append(f"{name} (report missing)")
              elif not check(report):
                  failures.append(name)

          if failures:
              print(f"::error::Gate 0 failed: {', '.join(failures)}", file=sys.stderr)
              sys.exit(1)
          print("Gate 0: all blocking checks passed.")
          PYEOF

      - name: Emit Gate 0 final status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE=success
            DESC="Gate 0: all checks passed"
          else
            STATE=failure
            DESC="Gate 0: one or more checks failed"
          fi
          python3 ${{ env.SCRIPTS }}/emit_status.py \
            --context "ci/static-check" \
            --state "$STATE" \
            --description "$DESC" \
            --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─── GATE 3 — UNIT TESTS ──────────────────────────────────────────────────
  # dbt unit tests against state:modified+ models with mocked YAML inputs.
  # Runs in Fabric ephemeral workspace (sequential after Gate 2) so that
  # get_columns_in_relation() resolves against real tables in the Spark catalog.
  gate-3-unit:
    name: "ci/unit-tests: unit tests"
    needs: [provision, gate-2-write]
    if: github.event.action != 'closed' && needs.gate-2-write.result == 'success'
    timeout-minutes: 12
    concurrency:
      group: pr-${{ github.event.pull_request.number }}-gate-3
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pyyaml --quiet

      - run: mkdir -p reports

      - name: Login — Fabric UAMI
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_FABRIC_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Run Gate 3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 ${{ env.SCRIPTS }}/gate_runner.py run-gate \
            --gate 3 \
            --workspace-id "${{ needs.provision.outputs.ephemeral_workspace_id }}" \
            --lakehouse-id "${{ needs.provision.outputs.ephemeral_lakehouse_id }}" \
            --notebook-id "${{ needs.provision.outputs.notebook_id }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --output reports/gate-3.json

      - name: Upload Gate 3 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-gate-3-pr${{ github.event.pull_request.number }}
          path: reports/gate-3.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Post gate-3 comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          sys.path.insert(0, os.environ["SCRIPTS"])
          import pr_comment, notify_render
          try:
              with open("reports/gate-3.json") as f:
                  result = json.load(f)
          except (OSError, json.JSONDecodeError):
              result = None
          body = notify_render.render_gate_3_comment(result)
          pr_comment.upsert(notify_render.GATE_3_MARKER, body, os.environ["PR_NUMBER"], os.environ["REPO"])
          PYEOF

      - name: Emit Gate 3 final status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE=success
            DESC="Gate 3: unit tests passed"
          else
            STATE=failure
            DESC="Gate 3: unit tests failed — see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          python3 ${{ env.SCRIPTS }}/emit_status.py \
            --context "ci/unit-tests" \
            --state "$STATE" \
            --description "$DESC" \
            --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─── GATE 2 — WRITE ───────────────────────────────────────────────────────
  # Triggers the injected notebook via Fabric Item Jobs API, polls until
  # terminal, downloads gate-2.json, emits ci/run commit status.
  gate-2-write:
    name: "ci/run: isolated build"
    needs: [preflight, provision, fetch-prod-state]
    if: github.event.action != 'closed'
    timeout-minutes: 12
    concurrency:
      group: pr-${{ github.event.pull_request.number }}-gate-2
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pyyaml --quiet

      - name: Login — Fabric UAMI
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_FABRIC_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Run Gate 2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 ${{ env.SCRIPTS }}/gate_runner.py run-gate \
            --gate 2 \
            --workspace-id "${{ needs.provision.outputs.ephemeral_workspace_id }}" \
            --lakehouse-id "${{ needs.provision.outputs.ephemeral_lakehouse_id }}" \
            --notebook-id "${{ needs.provision.outputs.notebook_id }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Post gate-2 comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, sys
          sys.path.insert(0, ".github/scripts")
          import notify_render, pr_comment
          try:
              with open("reports/gate-2.json") as f:
                  result = json.load(f)
          except (OSError, json.JSONDecodeError):
              result = None
          body = notify_render.render_gate_2_comment(result)
          pr_comment.upsert("<!-- ci-run -->", body, os.environ["PR_NUMBER"], os.environ["GITHUB_REPOSITORY"])
          EOF

  # ─── GATE 4 — DATA TESTS ─────────────────────────────────────────────────
  # Triggers dbt test --store-failures via Fabric Item Jobs API after Gate 2.
  # Skipped (no ci/data-tests status emitted) when Gate 2 fails.
  gate-4-data-test:
    name: "ci/data-tests: data tests"
    needs: [provision, gate-2-write]
    if: always() && github.event.action != 'closed'
    timeout-minutes: 12
    concurrency:
      group: pr-${{ github.event.pull_request.number }}-gate-4
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pyyaml --quiet

      - name: Login — Fabric UAMI
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_FABRIC_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Run Gate 4
        if: needs.gate-2-write.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 ${{ env.SCRIPTS }}/gate_runner.py run-gate \
            --gate 4 \
            --workspace-id "${{ needs.provision.outputs.ephemeral_workspace_id }}" \
            --lakehouse-id "${{ needs.provision.outputs.ephemeral_lakehouse_id }}" \
            --notebook-id "${{ needs.provision.outputs.notebook_id }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --output reports/gate-4.json

      - name: Post gate-4 comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, sys
          sys.path.insert(0, ".github/scripts")
          import notify_render, pr_comment
          try:
              with open("reports/gate-4.json") as f:
                  result = json.load(f)
          except (OSError, json.JSONDecodeError):
              result = None
          body = notify_render.render_gate_4_comment(result)
          pr_comment.upsert("<!-- ci-data-tests -->", body, os.environ["PR_NUMBER"], os.environ["GITHUB_REPOSITORY"])
          EOF

  # ─── GATE 5 — DATA-DIFF ─────────────────────────────────────────────────────
  # Triggers data-diff vs prod via Fabric Item Jobs API after Gate 2.
  # Skipped (no ci/data-diff status emitted) when Gate 2 fails.
  gate-5-data-diff:
    name: "ci/data-diff: data-diff"
    needs: [provision, gate-2-write]
    if: always() && github.event.action != 'closed'
    timeout-minutes: 12
    concurrency:
      group: pr-${{ github.event.pull_request.number }}-gate-5
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pyyaml --quiet

      - name: Login — Fabric UAMI
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_FABRIC_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Run Gate 5
        if: needs.gate-2-write.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 ${{ env.SCRIPTS }}/gate_runner.py run-gate \
            --gate 5 \
            --workspace-id "${{ needs.provision.outputs.ephemeral_workspace_id }}" \
            --lakehouse-id "${{ needs.provision.outputs.ephemeral_lakehouse_id }}" \
            --notebook-id "${{ needs.provision.outputs.notebook_id }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --output reports/gate-5.json

      - name: Post gate-5 comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, sys
          sys.path.insert(0, ".github/scripts")
          import notify_render, pr_comment
          try:
              with open("reports/gate-5.json") as f:
                  result = json.load(f)
          except (OSError, json.JSONDecodeError):
