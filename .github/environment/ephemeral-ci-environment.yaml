# domain-ci-fabric-bundle/.github/environment/ephemeral-ci-environment.yaml
#
# Fabric Environment definition for ephemeral CI workspaces.
# Owned by domain-cicd; domain repos do not configure Spark compute.
# Changes to pool sizing or library pins go through CI PR review.
#
# Published Full Mode during provision (~10–15 min). Libraries are pre-baked
# into the runtime — no per-session pip install latency.

name: ephemeral-ci-env
runtime_version: "1.3"

spark_pool:
  node_size: Small
  auto_scale:
    enabled: true
    min_node_count: 1
    max_node_count: 3

pip_packages:
  - vd-dbt-fabricspark==1.9.15
