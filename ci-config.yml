# Domain CI Configuration
#
# Copy this file to the root of your domain repo and fill in the values.
# These are non-sensitive — do not store GUIDs as secrets, store them here.
#
# VD Studio populates this file automatically at domain setup time.

domain: <domain-name>                    # e.g. sales, finance, production

prod_workspace_id: <guid>               # Production Fabric workspace ID
prod_workspace_name: <string>           # Production Fabric workspace display name
prod_lakehouse_id: <guid>               # Production Fabric lakehouse ID
prod_lakehouse_name: <string>           # Production Fabric lakehouse display name
prod_schema: <string>                   # Production schema name (e.g. sales_datamart)

notebook_glob: "intents/**/*.ipynb"         # Glob pattern to find the dbt notebook

# prod_manifest_source configures how the CI pipeline fetches the production dbt manifest
# for Slim CI (dbt build --defer --state). If omitted, greenfield fallback is used.
#
# prod_manifest_source:
#   mode: artifact                    # artifact (default) or onelake (future — see design doc §4.5)
#
#   # artifact mode: downloads manifest.json from the latest successful CD workflow run on main.
#   workflow: deploy-prod.yml         # CD workflow file name in this repo
#   artifact_name: prod-manifest      # name of the GitHub Actions artifact containing manifest.json
#   main_branch: main                 # branch to resolve the latest run from (default: main)
#
#   # onelake mode (future — post-CD, see design doc §4.5 ADR):
#   # workspace_id: <prod-ws-guid>    # production Fabric workspace ID
#   # lakehouse_id: <prod-lh-guid>    # production Fabric lakehouse ID
#   # file_path: Files/ci-artifacts/prod-state/manifest.json
