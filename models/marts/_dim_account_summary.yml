version: 2

models:
  - name: dim_account_summary
    meta:
      owner: "@jasonkhaihoang"
    description: Account dimension — key attributes for reporting
    columns:
      - name: account_id
        description: Unique account identifier
        data_type: string
        tests:
          - unique
          - not_null
      - name: account_name
        description: Name of the account
        data_type: string
        tests:
          - not_null
      - name: account_type
        description: Type classification of the account
        data_type: string
      - name: industry
        description: Industry classification
        data_type: string
      - name: billing_city
        description: Billing city
        data_type: string
      - name: billing_state
        description: Billing state
        data_type: string
      - name: billing_country
        description: Billing country
        data_type: string
