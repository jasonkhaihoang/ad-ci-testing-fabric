version: 2

models:
  - name: fct_pipeline
    config:
      meta:
        owner: jason.khai.hoang@acceleratedata.ai
    description: |
      **Sales pipeline fact table** - the core analytical table for pipeline reporting and forecasting.

      **Grain:** One row per opportunity (current state snapshot, not historical).

      **Business Purpose:** Enables sales leadership to monitor pipeline health, forecast revenue,
      track win rates, and analyze sales performance across accounts, reps, and stages.

      **Key Metrics:**
      - Pipeline value (amount)
      - Weighted pipeline (amount × probability for forecasting)
      - Sales cycle duration (days from created to closed)
      - Win/loss analysis

      **Data Quality Notes:**
      - Includes orphaned opportunities (null account_id) for investigation - flagged via is_orphaned_opportunity
      - Includes zero-value opportunities for completeness - flagged via is_zero_value
      - LEFT JOINs preserve all opportunities even if dimension records are missing

    tests:
      - expression_is_true:
          expression: "close_date is not null"
          where: "is_closed = true"
          name: fct_pipeline_closed_opportunities_have_close_date
          config:
            severity: error

      - expression_is_true:
          expression: "amount >= 0"
          where: "amount is not null"
          name: fct_pipeline_amount_non_negative
          config:
            severity: warn

    columns:
      - name: opportunity_id
        description: Primary key - unique identifier for the opportunity (grain column)
        data_type: string
        tests:
          - unique
          - not_null

      - name: account_id
        description: Foreign key to dim_account (may be null for orphaned opportunities)
        data_type: string
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_account')
              field: account_id
              config:
                severity: warn
                where: "account_id is not null"
          - null_rate_below_threshold:
              threshold: 0.02
              name: fct_pipeline_orphaned_opportunities_below_2_percent
              config:
                severity: warn

      - name: owner_id
        description: Foreign key to dim_user representing the sales rep who owns this opportunity
        data_type: string
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_user')
              field: user_id
              config:
                severity: warn
                where: "owner_id is not null"

      - name: opportunity_name
        description: Title or name of the sales opportunity
        data_type: string

      - name: stage_name
        description: Current sales stage (e.g., Prospecting, Qualification, Closed Won)
        data_type: string
        tests:
          - not_null

      - name: opportunity_type
        description: Type/category of opportunity (e.g., New Business, Upsell, Renewal)
        data_type: string

      - name: lead_source
        description: Original source that generated this opportunity
        data_type: string

      - name: amount
        description: Total monetary value of the opportunity
        data_type: decimal

      - name: probability
        description: Likelihood of closing (0-100%), typically aligned with stage
        data_type: integer

      - name: expected_revenue
        description: Salesforce-calculated expected revenue (amount × probability)
        data_type: decimal

      - name: weighted_amount
        description: |
          **Calculated metric:** amount × (probability / 100) for weighted pipeline forecasting.
          Null if amount or probability is null. Used for forecast rollups.
        data_type: decimal

      - name: created_date
        description: When the opportunity was first created in Salesforce
        data_type: timestamp
        tests:
          - not_null

      - name: close_date
        description: Expected or actual close date (required for closed opportunities)
        data_type: date

      - name: last_stage_change_date
        description: Date when the opportunity last moved to a different stage
        data_type: date

      - name: is_closed
        description: Boolean flag - true if opportunity is closed (won or lost)
        data_type: boolean
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: is_won
        description: Boolean flag - true if opportunity was won (only meaningful if is_closed = true)
        data_type: boolean
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: forecast_category
        description: |
          **Calculated field:** Derived from is_closed, is_won, and probability.
          Values: 'Closed Won', 'Closed Lost', 'Best Case' (prob ≥ 75),
          'Commit' (prob ≥ 50), 'Pipeline' (prob ≥ 25), 'Upside' (prob < 25).
          Used for pipeline forecasting and segmentation.
        data_type: string
        tests:
          - not_null
          - accepted_values:
              values: ['Closed Won', 'Closed Lost', 'Best Case', 'Commit', 'Pipeline', 'Upside']

      - name: sales_cycle_days
        description: |
          **Calculated metric:** Number of days from created_date to close_date.
          Only populated for closed opportunities. Used for sales velocity analysis.
        data_type: integer

      - name: opportunity_age_days
        description: |
          **Calculated metric:** Number of days from created_date to current date.
          Indicates how long the opportunity has been in the system.
        data_type: integer

      - name: days_in_current_stage
        description: |
          **Calculated metric:** Number of days since last_stage_change_date.
          Only populated for open opportunities. Helps identify stale deals.
        data_type: integer

      - name: is_orphaned_opportunity
        description: |
          **Data quality flag:** True if account_id is null.
          These opportunities need investigation and are excluded from account-level rollups.
        data_type: boolean

      - name: is_zero_value
        description: |
          **Data quality flag:** True if amount is 0 or null.
          Included for completeness but excluded from weighted pipeline calculations.
        data_type: boolean

      - name: last_modified_date
        description: When the opportunity record was last updated
        data_type: timestamp

      - name: system_modified_timestamp
        description: System-maintained modification timestamp for change tracking
        data_type: timestamp

      # Denormalized dimensions (for query convenience)
      - name: account_name
        description: Denormalized from dim_account - customer/prospect company name
        data_type: string

      - name: account_type
        description: Denormalized from dim_account - account classification
        data_type: string

      - name: industry
        description: Denormalized from dim_account - industry vertical
        data_type: string

      - name: billing_city
        description: Denormalized from dim_account - customer city
        data_type: string

      - name: billing_state
        description: Denormalized from dim_account - customer state/province
        data_type: string

      - name: billing_country
        description: Denormalized from dim_account - customer country
        data_type: string

      - name: owner_name
        description: Denormalized from dim_user - full name of opportunity owner (sales rep)
        data_type: string

      - name: owner_email
        description: Denormalized from dim_user - email of opportunity owner
        data_type: string

      - name: owner_is_active
        description: Denormalized from dim_user - whether the owner's account is active
        data_type: boolean

