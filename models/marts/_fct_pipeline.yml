          - opportunity_id: OPP001
            account_id: ACC001
            owner_id: USR001
            opportunity_name: Test Deal
            stage_name: Closed Won
            opportunity_type: New Business
            lead_source: Web
            amount: 50000
            probability: 85
            expected_revenue: 42500
            created_date: 2026-01-15 10:00:00
            close_date: 2026-03-20
            last_stage_change_date: 2026-03-20
            is_closed: true
            is_won: true
            last_modified_date: 2026-03-20 14:30:00
            system_modified_timestamp: 2026-03-20 14:30:00
      - input: ref('dim_account')
        rows:
          - account_id: ACC001
            account_name: Acme Corp
            account_type: Customer
            industry: Technology
            billing_city: San Francisco
            billing_state: CA
            billing_country: USA
            owner_id: USR001
            created_date: 2025-12-01 09:00:00
            last_modified_date: 2025-12-01 09:00:00
      - input: ref('dim_user')
        rows:
