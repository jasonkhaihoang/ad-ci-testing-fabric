version: 2

models:
  - name: dim_vd2336_active_accounts
    meta:
      owner: "@jasonkhaihoang"
    description: |
      VD-2336 validation model. Table-materialized mart derived from stg_salescloud__account.
      Added alongside a view-materialized stg bump to validate that gate 2 clones table models
      (AC-3) while skipping clone for view models (AC-1).
    columns:
      - name: account_id
        description: Primary key
        data_type: string
        tests:
          - unique
          - not_null

      - name: account_name
        description: Name of the account
        data_type: string

      - name: account_type
        description: Type of account
        data_type: string

      - name: industry
        description: Industry classification
        data_type: string

      - name: billing_city
        description: Billing city
        data_type: string

      - name: billing_state
        description: Billing state
        data_type: string

      - name: billing_country
        description: Billing country
        data_type: string

      - name: created_date
        description: Account creation timestamp
        data_type: timestamp
